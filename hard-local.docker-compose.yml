services:
  web:
    image: daniilsolo/ai-review-frontend
    ports:
      - "80:80"
    volumes:
      - ./extra/nginx/hard-local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: .
    command: uv run uvicorn src.interfaces.api.app:app --host 0.0.0.0 --port 8000
    env_file:
      - .hard-local.env
    environment:
      - APP=api
    ports:
      - "8000:8000"
    volumes:
      - hard_local_autoreviewer_storage_data:/app/storage
    depends_on:
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  migrations:
    build: .
    command: uv run alembic upgrade head
    env_file:
      - .hard-local.env
    environment:
      - APP=migrations
    volumes:
      - hard_local_autoreviewer_storage_data:/app/storage
    depends_on:
      database:
        condition: service_healthy
    restart: on-failure

  worker:
    build: .
    command: uv run python -m src.interfaces.cli.worker
    env_file:
      - .hard-local.env
    environment:
      - APP=worker
    volumes:
      - hard_local_autoreviewer_storage_data:/app/storage
    depends_on:
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  database:
    image: postgres:16
    env_file:
      - .hard-local.env
    ports:
      - "5432:5432"
    volumes:
      - hard_local_autoreviewer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hard_local_autoreviewer_postgres_data:
  hard_local_autoreviewer_storage_data:
