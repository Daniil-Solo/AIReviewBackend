apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: "Request ID"
          matcherRegex: '"request_id":"([^"]+)"'
          url: '$${__value.raw}'
          datasourceUid: "loki"
