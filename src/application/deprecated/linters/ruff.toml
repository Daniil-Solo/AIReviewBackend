# Файл ruff.toml

# Целевая версия Python
target-version = "py310"

# Исключаемые директории и файлы
exclude = [
    ".git",
    "__pycache__",
    "venv",
    "env",
    ".venv",
    "tests",
    "alembic",
    "migrations"
]

[lint]
# Правила: включаем категории и отдельные коды для критических ошибок
# F - Pyflakes (неопределённые/неиспользуемые переменные, синтаксис)
# E, W - pycodestyle (только критические: E101, W191 – смешение отступов)
# B - flake8-bugbear (распространённые логические баги)
# C4 - flake8-comprehensions (ошибки в генераторах/списковых включениях)
# EM - flake8-errmsg (неинформативные исключения)
# RSE - flake8-raise (неправильное возбуждение исключений)
# RET - flake8-return (некорректные возвраты)
# SIM - flake8-simplify (упрощение, но берём только правила про реальные ошибки)
# TID - flake8-tidy-imports (запрет относительных импортов, если нужна строгость)
# PTH - flake8-use-pathlib (использование pathlib вместо os.path – избегаем проблем)
# UP - pyupgrade (устаревшие конструкции, которые могут сломаться в новых версиях)
# I - isort (порядок импортов – косвенно влияет на исполнимость)

select = [
    # Pyflakes – обязателен
    "F",
    # Критические ошибки из pycodestyle
    "E101",   # смесь табов и пробелов (ломает выполнение)
    "W191",   # использование табов
    # Bugbear – баги
    "B",
    "B006",   # изменяемый аргумент по умолчанию (список/словарь)
    "B007",   # неиспользуемая переменная в цикле (логическая ошибка)
    # Компрехеншены
    "C4",
    # Ошибки сообщений исключений
    "EM",
    # Неправильный raise
    "RSE",
    # Логика return
    "RET",
    # Критические упрощения (например, повторное вычисление)
    "SIM101", # двойное тождество `a == a`
    "SIM102", # вложенный if можно объединить
    "SIM103", # избыточный elif
    "SIM105", # голый except
    "SIM107", # возврат в try/finally (потеря исключения)
    "SIM108", # if-else → тернарник (не критично, но упрощает чтение)
    "SIM113", # неиспользуемая переменная цикла
    # Пути и файлы
    "PTH",
    # Импорты
    "TID252", # запрет относительных импортов
    # Устаревшее
    "UP",
]

# Исключаем избыточные правила, которые не относятся к критическим ошибкам
ignore = [
    # Стилистические и форматные (не влияют на работу программы)
    "E111", "E114", "E115", "E116", "E117",
    "W291", "W292", "W293", "W391",
    "E501",   # длина строки
    "D",      # docstring-и (не критично)
    "ANN",    # аннотации типов
    "S",      # проверки безопасности (часто избыточно для учебных заданий)
    "B008",   # вызов функции в аргументе по умолчанию (конфликтует с FastAPI)
    "I001",   # сортировка импортов (решается автоформатированием)
]
